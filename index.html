<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>字根字首學習系統</title>
<style>
/* ══════ THEME VARIABLES ══════ */
:root{
  --bg:#edf5ed;--sur:#fff;--sur2:#f0f9f3;
  --h1:#1e5c30;--h2:#3a8a50;
  --tb:#fff;--tt:#888;
  --ta-bg:transparent;--ta-fg:#1e5c30;
  --tx:#333;--tx2:#777;--tx3:#bbb;
  --ac:#3a8a50;--ac-d:#1e5c30;--ac-l:#e8f5e9;
  --bk:#f5a623;--bd:#e0e0e0;
  --pc:#1565C0;--pb:#E3F2FD;
  --rc:#2E7D32;--rb:#E8F5E9;
  --sc:#E65100;--sb:#FFF3E0;
  --cs:0 2px 4px rgba(30,92,48,.04),0 8px 24px -4px rgba(0,0,0,.09);
  --tab-on-bb:2px solid var(--ac);--tab-on-mb:-1.5px;
  --tab-bar-bb:1px solid var(--bd);
  --tab-hov:var(--ac-l);--tab-hov-c:var(--ac);
}
[data-theme=minimal]{
  --bg:#F7F7F7;--sur:#fff;--sur2:#F2F2F2;
  --h1:#111;--h2:#3A3A3A;
  --tb:#1A1A1A;--tt:rgba(255,255,255,.5);
  --ta-bg:#F7F7F7;--ta-fg:#111;
  --tx:#111;--tx2:#888;--tx3:#CCC;
  --ac:#0055BB;--ac-d:#003A80;--ac-l:#E8F0FF;
  --bk:#0055BB;--bd:#DDD;
  --pc:#0046A8;--pb:#EBF2FF;
  --rc:#006B40;--rb:#E5F5EE;
  --sc:#B54000;--sb:#FFF2EA;
  --cs:0 1px 3px rgba(0,0,0,.08);
  --tab-on-bb:3px solid transparent;--tab-on-mb:0;
  --tab-bar-bb:none;
  --tab-hov:rgba(255,255,255,.09);--tab-hov-c:rgba(255,255,255,.9);
}
[data-theme=retro]{
  --bg:#F2E1C1;--sur:#FFF9EE;--sur2:#F5E8D0;
  --h1:#5C3317;--h2:#8B5E3C;
  --tb:#5C3317;--tt:rgba(255,235,190,.6);
  --ta-bg:#F2E1C1;--ta-fg:#3D2010;
  --tx:#3D2010;--tx2:#8B6045;--tx3:#BEA07A;
  --ac:#A0522D;--ac-d:#6B3520;--ac-l:#F5E8D0;
  --bk:#C4592B;--bd:#D4B898;
  --pc:#4A5568;--pb:#E6DFD0;
  --rc:#6B4226;--rb:#EFE2CC;
  --sc:#9B4F25;--sb:#F5E0CC;
  --cs:0 2px 6px rgba(80,40,10,.12);
  --tab-on-bb:3px solid transparent;--tab-on-mb:0;
  --tab-bar-bb:none;
  --tab-hov:rgba(255,255,255,.09);--tab-hov-c:rgba(255,255,255,.9);
}
[data-theme=cyber]{
  --bg:#07071A;--sur:#0E0E26;--sur2:#141435;
  --h1:#0A0A24;--h2:#160A30;
  --tb:#080820;--tt:rgba(150,150,220,.55);
  --ta-bg:#07071A;--ta-fg:#00FFD1;
  --tx:#D8D8FF;--tx2:#6668AA;--tx3:#3A3A7A;
  --ac:#00FFD1;--ac-d:#00BFA0;--ac-l:rgba(0,255,209,.1);
  --bk:#FF00FF;--bd:#1C1C4A;
  --pc:#80C4FF;--pb:rgba(128,196,255,.12);
  --rc:#00FFD1;--rb:rgba(0,255,209,.1);
  --sc:#FF9A3C;--sb:rgba(255,154,60,.12);
  --cs:0 0 20px rgba(0,255,209,.06);
  --tab-on-bb:3px solid transparent;--tab-on-mb:0;
  --tab-bar-bb:none;
  --tab-hov:rgba(255,255,255,.09);--tab-hov-c:rgba(255,255,255,.9);
}
[data-theme=earthy]{
  --bg:#F4EDE0;--sur:#FFFAF4;--sur2:#EDE4D4;
  --h1:#4A3728;--h2:#6E5244;
  --tb:#3D2E22;--tt:rgba(240,220,190,.55);
  --ta-bg:#F4EDE0;--ta-fg:#3D2E22;
  --tx:#3A2B1E;--tx2:#8A6E55;--tx3:#C0A888;
  --ac:#7C9E3E;--ac-d:#5A7230;--ac-l:#EDF3DC;
  --bk:#D4873A;--bd:#CDB99A;
  --pc:#5878A6;--pb:#E6EEF8;
  --rc:#547230;--rb:#E8F0D8;
  --sc:#C4682A;--sb:#FAE8D8;
  --cs:0 2px 8px rgba(60,40,20,.1);
  --tab-on-bb:3px solid transparent;--tab-on-mb:0;
  --tab-bar-bb:none;
  --tab-hov:rgba(255,255,255,.09);--tab-hov-c:rgba(255,255,255,.9);
}
[data-theme=corp]{
  --bg:#EDF2F8;--sur:#fff;--sur2:#F2F6FC;
  --h1:#1A2B4A;--h2:#2C4A7C;
  --tb:#1A2B4A;--tt:rgba(180,200,240,.55);
  --ta-bg:#EDF2F8;--ta-fg:#1A2B4A;
  --tx:#1A2535;--tx2:#6B7D96;--tx3:#A8B8CC;
  --ac:#1E6EC8;--ac-d:#1A4E8A;--ac-l:#E8F1FC;
  --bk:#1E6EC8;--bd:#C8D5E8;
  --pc:#1E50A8;--pb:#EAF0FC;
  --rc:#1A7030;--rb:#E5F5EA;
  --sc:#B04400;--sb:#FFF0E5;
  --cs:0 1px 4px rgba(0,0,0,.09);
  --tab-on-bb:3px solid transparent;--tab-on-mb:0;
  --tab-bar-bb:none;
  --tab-hov:rgba(255,255,255,.09);--tab-hov-c:rgba(255,255,255,.9);
}

/* ══════ PASSWORD GATE ══════ */
#pw-gate{position:fixed;inset:0;z-index:9999;background:#1e5c30;display:flex;align-items:center;justify-content:center}
.pw-box{display:flex;flex-direction:column;align-items:center;gap:16px}
.pw-input{width:180px;padding:12px 16px;font-size:1.4rem;text-align:center;border:none;border-radius:10px;outline:none;letter-spacing:6px;font-family:inherit}
.pw-btn{padding:10px 36px;font-size:1rem;border:none;border-radius:8px;background:#fff;color:#1e5c30;font-weight:700;cursor:pointer;transition:opacity .15s}
.pw-btn:hover{opacity:.85}
.pw-err{color:#ffcdd2;font-size:.85rem;min-height:1.2em;text-align:center}
.pw-title{color:#fff;font-size:1.6rem;font-weight:900;letter-spacing:2px;text-shadow:0 2px 8px rgba(0,0,0,.2)}
.pw-chrome-note{color:rgba(255,255,200,.9);font-size:.78rem;text-align:center;background:rgba(0,0,0,.28);padding:8px 16px;border-radius:8px;line-height:1.75;border:1px solid rgba(255,255,255,.18)}

/* ══════ BASE ══════ */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Microsoft JhengHei','PingFang TC',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;transition:background .3s,color .3s}
[data-theme=retro] body{font-family:Georgia,serif}
[data-theme=cyber] body{
  background-image:linear-gradient(rgba(0,255,209,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,209,.02) 1px,transparent 1px);
  background-size:32px 32px}
[data-theme=retro] body{background-image:radial-gradient(circle,rgba(139,94,60,.06) 1px,transparent 1px);background-size:22px 22px}
[data-theme=earthy] body{background-image:radial-gradient(ellipse,rgba(124,158,62,.055) 1px,transparent 1px);background-size:20px 20px}

/* ══════ APP BAR ══════ */
.app-bar{background:linear-gradient(135deg,var(--h1),var(--h2));padding:9px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;gap:10px;flex-wrap:wrap}
[data-theme=cyber] .app-bar{border-bottom:1px solid rgba(0,255,209,.2)}
.bar-left{display:flex;align-items:center;gap:10px}
.app-logo{color:#fff;font-weight:900;font-size:1rem;letter-spacing:1px;opacity:.9;cursor:pointer;white-space:nowrap}
.app-logo:hover{opacity:1}
.th-row{display:flex;gap:5px;align-items:center}
.th-sw{width:18px;height:18px;border-radius:50%;border:2px solid rgba(255,255,255,.35);cursor:pointer;flex-shrink:0;transition:transform .18s,border-color .18s}
.th-sw:hover,.th-sw.on{transform:scale(1.35);border-color:#fff}
.thg{background:#3a8a50}.thm{background:#222}.thr{background:#8B4513}
.thc{background:conic-gradient(#00FFD1,#FF00FF,#00FFD1)}.the{background:#7C9E3E}.thb{background:#1E6EC8}
.voice-bar{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.voice-bar label{color:rgba(255,255,255,.75);font-size:.75rem}
#voiceSel{padding:3px 7px;border-radius:5px;border:none;font-size:.78rem;background:rgba(255,255,255,.18);color:#fff;max-width:155px}
#voiceSel option{background:var(--h1)}
#rateR{width:60px;accent-color:#fff}
#rateV{color:rgba(255,255,255,.75);font-size:.75rem;min-width:28px}

/* ══════ HOME VIEW ══════ */
#view-home{max-width:960px;margin:0 auto;padding:20px 14px}
.home-hero{padding:22px 0 14px;text-align:center}
.hero-ttl{font-size:2rem;font-weight:900;color:var(--ac-d);letter-spacing:1px}
[data-theme=cyber] .hero-ttl{color:var(--ac);text-shadow:0 0 16px rgba(0,255,209,.4)}
.hero-sub{font-size:.88rem;color:var(--tx2);margin-top:5px}
.hero-bar{display:flex;justify-content:center;gap:14px;margin-top:18px;flex-wrap:wrap}
.hero-stat{text-align:center;background:var(--sur);border-radius:18px;padding:14px 22px;box-shadow:var(--cs);border:1px solid var(--bd);min-width:82px}
.hero-sn{font-size:1.5rem;font-weight:900;color:var(--ac)}
.hero-sl{font-size:.72rem;color:var(--tx2)}

.unit-list{display:flex;flex-direction:column;gap:22px;align-items:center}
.unit-grp{width:100%;max-width:582px}
.unit-lbl{font-size:.7rem;font-weight:700;color:var(--tx2);letter-spacing:2.5px;text-transform:uppercase;margin-bottom:9px;display:flex;align-items:center;gap:8px}
.unit-lbl::after{content:'';flex:1;height:1px;background:var(--bd)}
.ch-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px}
@media(max-width:480px){.ch-row{grid-template-columns:repeat(2,1fr)}}

.ch-card{position:relative;background:var(--sur);border-radius:18px;padding:16px 14px;border:1.5px solid var(--bd);box-shadow:var(--cs);display:flex;flex-direction:column;gap:5px;min-height:108px;transition:transform .18s,box-shadow .18s,border-color .18s}
.ch-card.open{cursor:pointer}
.ch-card.open:hover{transform:translateY(-4px);box-shadow:0 10px 28px rgba(0,0,0,.13);border-color:var(--ac)}
[data-theme=cyber] .ch-card.open:hover{box-shadow:0 0 20px rgba(0,255,209,.2)}
.ch-card.locked{opacity:.45;cursor:default}
.ch-tag{font-size:.65rem;font-weight:700;background:var(--ac-l);color:var(--ac-d);padding:2px 7px;border-radius:4px;align-self:flex-start;letter-spacing:.5px}
[data-theme=cyber] .ch-tag{color:var(--ac)}
.ch-sec{font-size:.92rem;font-weight:700;color:var(--tx)}
.ch-words{font-size:.72rem;color:var(--tx2)}
.ch-lock{font-size:1rem;margin-bottom:2px}
.ch-coming{font-size:.7rem;color:var(--tx3)}
.ch-cta{margin-top:auto;font-size:.75rem;color:var(--ac);font-weight:600}
.ch-prog-wrap{margin-top:auto}
.ch-prog{height:4px;background:var(--bd);border-radius:4px;overflow:hidden;margin-bottom:3px}
.ch-prog div{height:100%;background:var(--ac);border-radius:4px}
.ch-ok-dot{position:absolute;top:10px;right:10px;width:22px;height:22px;background:#1e8c3a;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:.78rem;font-weight:900;line-height:1;pointer-events:none}
.ok-btn{background:transparent;border:1.5px solid var(--bd);border-radius:20px;padding:5px 14px;font-size:.78rem;color:var(--tx2);cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s;white-space:nowrap}
.ok-btn.done{background:#1e8c3a;color:#fff;border-color:#1e8c3a}
.ch-pct{font-size:.7rem;color:var(--ac);font-weight:600}

/* ══════ STUDY VIEW ══════ */
#view-study{display:none}
.study-topbar{background:var(--sur);border-bottom:1.5px solid var(--bd);padding:8px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:46px;z-index:150}
.study-back{background:var(--ac-l);border:none;border-radius:20px;padding:5px 14px;font-size:.78rem;color:var(--ac-d);cursor:pointer;font-family:inherit;font-weight:600;transition:all .2s}
.study-back:hover{background:var(--ac);color:#fff;transform:translateY(-1px)}
.study-ttl{font-size:.88rem;font-weight:600;color:var(--tx);flex:1}
.study-kps{font-size:.75rem;color:var(--tx2)}

/* ══════ TABS ══════ */
.tabbar{display:flex;background:var(--tb);overflow-x:auto;scrollbar-width:none;position:sticky;top:88px;z-index:100;border-bottom:var(--tab-bar-bb)}
.tabbar::-webkit-scrollbar{display:none}
.tabbar button{flex:1;min-width:56px;padding:7px 5px;border:none;border-bottom:2px solid transparent;background:transparent;color:var(--tt);font-size:.74rem;cursor:pointer;font-family:inherit;font-weight:400;white-space:nowrap;transition:all .2s;letter-spacing:.3px}
.tabbar button.on{background:var(--ta-bg);color:var(--ta-fg);font-weight:600;border-bottom:var(--tab-on-bb);margin-bottom:var(--tab-on-mb)}
.tabbar button:hover:not(.on){background:var(--tab-hov);color:var(--tab-hov-c)}
[data-theme=cyber] .tabbar button.on{text-shadow:0 0 8px var(--ac)}

/* ══════ PAGES ══════ */
.pg{display:none;padding:14px 13px;max-width:860px;margin:0 auto}
.pg.on{display:block}

/* ══════ VOCAB TAB ══════ */
.legend{display:flex;gap:9px;flex-wrap:wrap;margin-bottom:12px;padding:8px 12px;background:var(--sur);border-radius:8px;box-shadow:var(--cs);font-size:.78rem;align-items:center;border:1px solid var(--bd)}
.lp{color:var(--pc);background:var(--pb);padding:2px 7px;border-radius:4px;font-weight:600}
.lr{color:var(--rc);background:var(--rb);padding:2px 7px;border-radius:4px;font-weight:600}
.ls{color:var(--sc);background:var(--sb);padding:2px 7px;border-radius:4px;font-weight:600}
.ctrl{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center}
.cbtn{padding:6px 13px;border:1.5px solid var(--ac);border-radius:18px;background:var(--sur);color:var(--ac);cursor:pointer;font-size:.8rem;font-family:inherit;transition:all .2s}
.cbtn.on{background:var(--ac);color:#fff}
.cbtn:hover:not(.on){background:var(--ac-l)}
.kpc{background:var(--sur);border-radius:16px;margin-bottom:14px;overflow:hidden;box-shadow:var(--cs);border:1px solid var(--bd)}
[data-theme=cyber] .kpc{border-color:rgba(0,255,209,.18)}
.kph{background:var(--ac-d);color:#fff;padding:9px 15px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
[data-theme=cyber] .kph{background:linear-gradient(90deg,#0D1B35,#1A0A3E);border-bottom:1px solid rgba(0,255,209,.25)}
[data-theme=retro] .kph{background:linear-gradient(135deg,#5C3317,#7B4A2A)}
.kpn{font-size:.9rem;font-weight:700}
.kpnt{font-size:.82rem;color:var(--tx2);padding:5px 15px 6px;background:var(--sur2);border-bottom:1px solid var(--bd)}
.wrow{border-bottom:1px dotted var(--bd);padding:9px 15px}
.wrow:last-child{border-bottom:none}
.wtop{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.mp{color:var(--pc);background:var(--pb);border-radius:3px;padding:0 2px}
.mr{color:var(--rc);background:var(--rb);border-radius:3px;padding:0 2px}
.ms{color:var(--sc);background:var(--sb);border-radius:3px;padding:0 2px}
.wen{font-size:1.06rem;font-weight:700;cursor:pointer;line-height:1.2;transition:opacity .15s}
.wen:hover{opacity:.65}
[data-theme=cyber] .wen:hover{opacity:1;text-shadow:0 0 10px var(--ac)}
.wtp{color:var(--tx2);font-size:.75rem;white-space:nowrap}
.wzh{color:var(--tx);font-size:.88rem;flex:1}
.wzh.hd{color:transparent;background:var(--bd);border-radius:3px;cursor:pointer;user-select:none}
.wzh.hd:hover{opacity:.7}
.bstar{background:none;border:none;font-size:1.05rem;cursor:pointer;padding:1px;transition:transform .15s}
.bstar:hover{transform:scale(1.4)}
.wmne{font-size:.82rem;color:var(--ac-d);padding:3px 8px 3px 10px;border-left:2px solid var(--ac);line-height:1.6;margin-top:3px}
[data-theme=cyber] .wmne{color:var(--ac)}
[data-theme=retro] .wmne{color:var(--ac)}
.exs{margin-top:5px}
.exi{display:flex;align-items:flex-start;gap:6px;padding:2px 0;cursor:pointer;font-size:.83rem;color:var(--tx2);line-height:1.5;transition:color .15s}
.exi:hover{color:var(--ac-d)}
.exb{color:var(--ac);font-weight:700;flex-shrink:0}
.exzh{font-size:.76rem;color:var(--tx3);margin-top:2px}

/* ══════ PRACTICE SHARED ══════ */
.pbox{background:var(--sur);border-radius:18px;padding:22px 18px;box-shadow:var(--cs);margin-bottom:12px;border:1px solid var(--bd)}
[data-theme=cyber] .pbox{border-color:rgba(0,255,209,.15);box-shadow:0 0 22px rgba(0,255,209,.05)}
.prow{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px}
.plbl{font-size:.8rem;color:var(--tx2)}
.sclbl{font-size:.8rem;color:var(--ac);font-weight:700}
.pbar{height:6px;background:var(--bd);border-radius:6px;margin-bottom:16px;overflow:hidden}
.pfill{height:100%;background:linear-gradient(90deg,var(--ac-d),var(--ac));border-radius:6px;transition:width .4s}
.qtag{display:inline-block;font-size:.72rem;color:var(--tx2);background:var(--sur2);padding:2px 8px;border-radius:9px;margin-bottom:10px;border:1px solid var(--bd)}
.zhbox{background:var(--ac-l);border-left:4px solid var(--ac);padding:10px 13px;border-radius:0 7px 7px 0;margin-bottom:13px}
.zhlab{font-size:.65rem;color:var(--tx2);margin-bottom:3px}
.zhtxt{font-size:1rem;color:var(--ac-d);font-weight:600;line-height:1.6}
[data-theme=cyber] .zhtxt{color:var(--ac)}
.sentbox{font-size:1.05rem;line-height:2;padding:11px;background:var(--sur2);border-radius:7px;margin-bottom:12px;color:var(--tx);border:1px solid var(--bd)}
.blank{display:inline-block;background:#fff8e1;border:2px dashed var(--bk);border-radius:5px;padding:0 6px;font-family:'Courier New',monospace;font-size:.98rem;color:#b57800;letter-spacing:2px;font-weight:700}
[data-theme=cyber] .blank{background:rgba(255,0,255,.08);border-color:#FF00FF;color:#FF9FFF}
.hnote{font-size:.75rem;color:var(--tx3);margin-bottom:7px}
.irow{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.ains{flex:1;min-width:140px;padding:9px 12px;font-size:.93rem;border:2px solid var(--bd);border-radius:7px;outline:none;font-family:inherit;background:var(--sur);color:var(--tx);transition:border-color .25s}
.ains:focus{border-color:var(--ac);box-shadow:0 0 0 3px rgba(58,138,80,.15)}
.ains.ok{border-color:#43a047;background:#f1fff4}
.ains.ng{border-color:#e53935;background:#fff1f1}
[data-theme=cyber] .ains.ok{background:rgba(0,255,100,.07);border-color:#00FF88}
[data-theme=cyber] .ains.ng{background:rgba(255,0,80,.07);border-color:#FF3060}
.btn{padding:9px 16px;font-size:.86rem;border:none;border-radius:12px;cursor:pointer;font-weight:700;font-family:inherit;transition:opacity .2s,transform .15s,box-shadow .2s}
.btn:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 4px 12px rgba(0,0,0,.15)}.btn:active{transform:scale(.97)}
.bck{background:var(--ac);color:#fff}
.bnx{background:var(--bk);color:#fff}
.brs{background:var(--ac-d);color:#fff;padding:11px 26px;font-size:.93rem}
.bsc{background:var(--sur2);color:var(--tx2);border:1px solid var(--bd)}
.bsc:hover{border-color:var(--ac);color:var(--ac)}
.fb{padding:9px 12px;border-radius:7px;font-size:.89rem;margin-bottom:9px;display:none}
.fb.ok{display:block;background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7}
.fb.ng{display:block;background:#ffebee;color:#b71c1c;border:1px solid #ef9a9a}
[data-theme=cyber] .fb.ok{background:rgba(0,255,100,.1);color:#00EE80;border-color:#00CC66}
[data-theme=cyber] .fb.ng{background:rgba(255,0,60,.1);color:#FF6080;border-color:#FF3060}
.final{text-align:center;padding:12px 0}
.fico{font-size:2.8rem;margin-bottom:9px}
.fttl{font-size:1.25rem;color:var(--ac-d);font-weight:700;margin-bottom:5px}
.fsc{font-size:2.4rem;color:var(--ac);font-weight:700;margin-bottom:4px}
.fsb{color:var(--tx2);font-size:.86rem;margin-bottom:18px}

.sparow{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-top:8px}

/* ══════ SPELL GAME ══════ */
.spell-wrap{max-width:580px;margin:0 auto}
.sp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:5px;font-size:.8rem;flex-wrap:wrap;gap:6px}
.sp-sct{color:var(--ac);font-weight:700}

.sp-card{background:var(--sur);border-radius:18px;padding:20px 18px;box-shadow:var(--cs);margin-bottom:12px;text-align:center;border:1px solid var(--bd)}

.sp-en{font-size:1.6rem;font-weight:900;letter-spacing:.06em;margin-bottom:4px;line-height:1.2}
.sp-zh{font-size:1.1rem;font-weight:700;color:var(--ac-d);margin-bottom:2px;line-height:1.3}

.sp-pos{font-size:.85rem;color:var(--tx2);margin-bottom:11px}

.sp-exzh{font-size:.75rem;color:var(--tx2);margin-top:3px;font-style:normal}
.sp-hint{display:flex;align-items:center;gap:11px;justify-content:center;margin-bottom:12px}
.sp-first{width:50px;height:50px;border-radius:9px;background:var(--ac-l);border:2.5px solid var(--ac);display:flex;align-items:center;justify-content:center;font-size:1.8rem;font-weight:900;color:var(--ac-d);font-family:'Courier New',monospace}
[data-theme=cyber] .sp-first{box-shadow:0 0 14px rgba(0,255,209,.4);color:var(--ac)}
.sp-lentag{font-size:.78rem;color:var(--tx2);background:var(--sur2);padding:3px 9px;border-radius:9px;border:1px solid var(--bd)}
.sp-mne{font-size:.78rem;color:var(--ac-d);padding:5px 10px 5px 12px;border-left:3px solid var(--ac);line-height:1.65;margin-top:7px;text-align:left;background:var(--ac-l);border-radius:0 6px 6px 0}
[data-theme=cyber] .sp-mne{color:var(--ac)}
[data-theme=retro] .sp-mne{color:var(--ac)}

/* Letter boxes */
.lboxes{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
.lboxes.lw .lb{width:34px;height:42px;font-size:1.1rem}
.lb{width:42px;height:50px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:1.35rem;font-weight:700;font-family:'Courier New',monospace;user-select:none;transition:background .15s,box-shadow .15s}
.lb.hint{background:var(--ac-l);color:var(--ac-d);border:2.5px solid var(--ac)}
[data-theme=cyber] .lb.hint{box-shadow:0 0 12px rgba(0,255,209,.35)}
.lb.typed{background:var(--ac);color:#fff;border:2px solid var(--ac-d)}
[data-theme=cyber] .lb.typed{box-shadow:0 0 8px rgba(0,255,209,.25)}
.lb.cur{background:var(--sur);border:2.5px dashed var(--ac);animation:bcur .75s ease infinite}
.lb.empty{background:var(--sur2);border:2px solid var(--bd)}
.lb.empty[data-m=p]{background:var(--pb);border-color:var(--pc)}
.lb.empty[data-m=r]{background:var(--rb);border-color:var(--rc)}
.lb.empty[data-m=s]{background:var(--sb);border-color:var(--sc)}
.lb.cur[data-m=p]{border-color:var(--pc)}
.lb.cur[data-m=r]{border-color:var(--rc)}
.lb.cur[data-m=s]{border-color:var(--sc)}
.lb.rev{background:var(--bk);color:#fff;border:2px solid var(--bk);animation:prev .3s ease backwards}
[data-theme=cyber] .lb.rev{background:var(--bk);box-shadow:0 0 12px rgba(255,0,255,.4)}
.lb.ef{animation:eflash .18s ease}
@keyframes bcur{0%,100%{opacity:1}50%{opacity:.28}}
@keyframes prev{0%{transform:scale(0) rotateY(90deg);opacity:0}65%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
@keyframes eflash{0%,100%{background:var(--sur2)}45%{background:#FFEBEE;border-color:#EF5350}}
[data-theme=cyber] .lb.ef{background:rgba(255,0,60,.2)!important;border-color:#FF3060!important;animation:none}

.sp-fb{min-height:32px;text-align:center;margin-bottom:8px}
.srok{background:var(--ac-l);color:var(--ac-d);padding:6px 14px;border-radius:7px;font-weight:700;font-size:.92rem;display:inline-block;border:1px solid var(--ac)}
.srsk{background:#FFF8E1;color:#E65100;padding:6px 14px;border-radius:7px;font-weight:700;font-size:.92rem;display:inline-block;border:1px solid #FFB74D}
[data-theme=cyber] .srok{background:rgba(0,255,100,.1);color:#00EE80;border-color:#00CC66}
.snd-row{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.sndbtn{padding:4px 9px;border:1.5px solid var(--bd);border-radius:12px;background:var(--sur);color:var(--tx2);cursor:pointer;font-size:.76rem;font-family:inherit;transition:all .2s}
.sndbtn.on{background:var(--ac);color:#fff;border-color:var(--ac)}
.sndbtn:hover:not(.on){border-color:var(--ac);color:var(--ac)}
.sp-acts{display:flex;gap:7px;justify-content:center;flex-wrap:wrap;margin-top:5px}
/* Spell final */
.spfin{text-align:center;padding:16px 0}
.spstars{font-size:2.2rem;letter-spacing:5px;margin-bottom:11px}
.spfsc{font-size:2.8rem;font-weight:900;color:var(--ac)}
.spfpct{font-size:.9rem;color:var(--tx2);margin-bottom:4px}
.spfmsg{font-size:1.1rem;color:var(--ac-d);font-weight:700;margin-bottom:20px}
[data-theme=cyber] .spfmsg{color:var(--ac)}

/* ══════ BOOKMARK ══════ */
.bmmt{text-align:center;color:var(--tx2);padding:40px;font-size:.92rem;line-height:2.2}
.bmgr{display:grid;grid-template-columns:repeat(auto-fill,minmax(178px,1fr));gap:9px}
.bmcard{background:var(--sur);border-radius:9px;padding:11px;box-shadow:var(--cs);display:flex;flex-direction:column;gap:4px;border:1px solid var(--bd)}
.bmw{font-size:.98rem;font-weight:700;color:var(--ac-d);cursor:pointer}
.bmw:hover{text-decoration:underline}
.bmzh{font-size:.84rem;color:var(--tx)}
.bmkp{font-size:.7rem;color:var(--tx3)}
.bmrm{background:none;border:1px solid #ef9a9a;color:#e53935;border-radius:5px;padding:3px 7px;font-size:.72rem;cursor:pointer;margin-top:4px;align-self:flex-start;transition:background .2s}
.bmrm:hover{background:#ffebee}

/* ══════ PRINT ══════ */
@media print{
  .app-bar,.study-topbar,.tabbar,.ctrl,.bstar,.brs,.snd-row,.sp-acts{display:none!important}
  #pg-practice,#pg-speech,#pg-spell,#pg-bookmark{display:none!important}
  .pg.on{display:block!important;padding:0}
  .kph{-webkit-print-color-adjust:exact;print-color-adjust:exact}
}
@media(max-width:520px){
  .irow{flex-direction:column}
  .sentbox{font-size:.92rem}
  .lb{width:35px;height:44px;font-size:1.1rem}
  .sp-en{font-size:1.3rem}
  .sp-zh{font-size:.95rem}
  .ch-row{grid-template-columns:repeat(auto-fill,minmax(130px,1fr))}
}

/* ══════ VOCAB DATA ══════ */
const VOCAB_U1I=[
  {kp:'KP01',root:'字根 -act-',note:'act- = 做 (do)',words:[
    {en:'factor',mm:[{t:'fact',m:'r'},{t:'or',m:'s'}],type:'(n.)',zh:'因素；要素',mne:'fact(做/發生) + -or(事物) → 使事情發生的東西 = 因素',
     ex:[{en:'Diet is a key factor in maintaining good health.',zh:'飲食是維持健康的關鍵因素。'},{en:'Many factors contributed to the success of the project.',zh:'許多因素促成了這個專案的成功。'}]},
    {en:'react',mm:[{t:'re',m:'p'},{t:'act',m:'r'}],type:'(v.)',zh:'反應；回應 ★ re-=再',mne:'re-(再) + act(做) → 再次行動作出回應 = 反應',
     ex:[{en:'How did she react when she heard the news?',zh:'她聽到這個消息時有什麼反應？'},{en:'The crowd reacted with cheers when the team scored.',zh:'球隊得分時，觀眾用歡呼聲作出回應。'}]},
    {en:'actor',mm:[{t:'act',m:'r'},{t:'or',m:'s'}],type:'(n.)',zh:'演員',mne:'act(做) + -or(人) → 做事的人 = 演員',
     ex:[{en:'The actor won an award for his outstanding performance.',zh:'這位演員因出色的表演而獲獎。'},{en:'She has been a stage actor for over twenty years.',zh:'她擔任舞台演員已逾二十年。'}]},
    {en:'enact',mm:[{t:'en',m:'p'},{t:'act',m:'r'}],type:'(v.)',zh:'制定（法律）；頒布 ★ en-=使成為',mne:'en-(使成為) + act(行動) → 使成為正式行動 = 制定法律',
     ex:[{en:'The government enacted a new law to protect the environment.',zh:'政府制定了一項新法律來保護環境。'},{en:'Congress enacted several reforms last year.',zh:'國會去年頒布了幾項改革法案。'}]},
    {en:'benefactor',mm:[{t:'bene',m:'p'},{t:'fact',m:'r'},{t:'or',m:'s'}],type:'(n.)',zh:'恩人；贊助者 ★ bene-=好',mne:'bene-(好) + fact(做) + -or(人) → 做好事的人 = 恩人',
     ex:[{en:'An anonymous benefactor donated a million dollars to the school.',zh:'一位匿名恩人捐了一百萬美元給學校。'},{en:'She was known as a great benefactor of the arts.',zh:'她以藝術界的重要贊助者著稱。'}]},
  ]},
  {kp:'KP02',root:'字根 -aim',note:'aim = 瞄準；-aim 形近字族',words:[
    {en:'claim',mm:[{t:'cl',m:''},{t:'aim',m:'r'}],type:'(v.)',zh:'聲稱；要求；奪走',
     ex:[{en:'He claimed that he had never been to that city.',zh:'他聲稱自己從未去過那座城市。'},{en:'The typhoon claimed thirty lives.',zh:'這場颱風奪走了三十條生命。'}]},
    {en:'aim',mm:[{t:'aim',m:'r'}],type:'(v./n.)',zh:'瞄準；目標',
     ex:[{en:'She aimed the camera at the beautiful sunset.',zh:'她將相機對準美麗的夕陽。'},{en:'My aim is to become a professional musician.',zh:'我的目標是成為一名專業音樂家。'}]},
    {en:'maim',mm:[{t:'m',m:''},{t:'aim',m:'r'}],type:'(v.)',zh:'使殘廢；嚴重傷害',

    {en:'exclaim',mm:[{t:'ex',m:'p'},{t:'cl',m:''},{t:'aim',m:'r'}],type:'(v.)',zh:'呼喊；驚叫 ★ ex-=向外',mne:'ex-(向外) + claim(呼喊) → 向外大聲喊出',
     ex:[{en:'She exclaimed with joy when she saw the surprise.',zh:'她看到驚喜時高興地叫出聲來。'},{en:'"What a beautiful view!" he exclaimed.',zh:'「多美的景色啊！」他驚呼道。'}]},
  ]},
  {kp:'KP03',root:'字根 -sume',note:'sume = 使用/取用 (take)',words:[
    {en:'consume',mm:[{t:'con',m:'p'},{t:'sume',m:'r'}],type:'(v.)',zh:'消耗；消費 ★ con-=完全',mne:'con-(完全) + sume(使用/取用) → 完全用盡 = 消耗',
     ex:[{en:'Electric cars consume much less fuel than traditional vehicles.',zh:'電動車消耗的燃料遠少於傳統車輛。'},{en:'The fire consumed the entire building within an hour.',zh:'火勢在一小時內吞噬了整棟建築。'}]},
    {en:'assume',mm:[{t:'as',m:'p'},{t:'sume',m:'r'}],type:'(v.)',zh:'推測（個人想法）★ as-=朝著',mne:'as-(朝著) + sume(取用) → 自行取用某個想法 = 假定',
     ex:[{en:'Do not assume that everyone shares your opinion.',zh:'別以為每個人都和你看法相同。'},{en:'I assumed the meeting was on Monday, but it was Tuesday.',zh:'我以為會議是週一，結果是週二。'}]},
    {en:'subsume',mm:[{t:'sub',m:'p'},{t:'sume',m:'r'}],type:'(v.)',zh:'歸入；包含 ★ sub-=在下',mne:'sub-(在下) + sume(取用) → 從下方將其納入 = 歸入；包含',
     ex:[{en:'These smaller issues can be subsumed under one main problem.',zh:'這些較小的問題可以歸入一個主要問題之下。'},{en:'The new policy subsumes all the previous guidelines.',zh:'新政策包含了之前所有的指導方針。'}]},

/* ══════ THEME ══════ */
function setTheme(btn){
  const t=btn.dataset.t;
  document.documentElement.dataset.theme=t;
  localStorage.setItem('vth',t);
  document.querySelectorAll('.th-sw').forEach(el=>el.classList.toggle('on',el.dataset.t===t));
}
(()=>{const t=localStorage.getItem('vth')||'';document.documentElement.dataset.theme=t;document.querySelectorAll('.th-sw').forEach(el=>el.classList.toggle('on',el.dataset.t===t));})();

/* ══════ SPEECH SYNTHESIS ══════ */
const syn=window.speechSynthesis; let vcs=[];
function loadV(){
  vcs=syn.getVoices(); const sel=document.getElementById('voiceSel'),prev=sel.value;
  sel.innerHTML='';
  const en=vcs.filter(v=>v.lang.startsWith('en'));
  (en.length?en:vcs).forEach(v=>{const o=document.createElement('option');o.value=v.name;o.textContent=v.name+' ('+v.lang+')';sel.appendChild(o);});
  if(prev&&[...sel.options].some(o=>o.value===prev))sel.value=prev;
}
syn.onvoiceschanged=loadV; loadV(); setTimeout(loadV,600);
document.getElementById('rateR').addEventListener('input',function(){document.getElementById('rateV').textContent=this.value+'×';});
function speak(txt){
  syn.cancel(); const u=new SpeechSynthesisUtterance(txt); u.lang='en-US';
  const v=vcs.find(v=>v.name===document.getElementById('voiceSel').value);
  if(v)u.voice=v; u.rate=parseFloat(document.getElementById('rateR').value)||0.85;
  syn.speak(u);
}

/* ══════ BOOKMARKS ══════ */
function bkKey(){return 'bm_'+currentChId+'_v3';}
function getBM(){try{return JSON.parse(localStorage.getItem(bkKey())||'[]');}catch(e){return[];}}
function setBM(a){localStorage.setItem(bkKey(),JSON.stringify(a));}
function isBM(en){return getBM().some(b=>b.en===en);}
function findW(en){for(const s of VOCAB){const w=s.words.find(w=>w.en===en);if(w)return{w,s};}return null;}
function togBM(en){
  let bm=getBM(),i=bm.findIndex(b=>b.en===en);
  if(i>=0)bm.splice(i,1);
  else{const f=findW(en);if(f)bm.push({en,zh:f.w.zh,kp:f.s.kp});}
  setBM(bm);
  document.querySelectorAll('[data-star="'+en+'"]').forEach(el=>el.textContent=isBM(en)?'⭐':'☆');
  if(document.getElementById('pg-bookmark').classList.contains('on'))buildBM();
}
function ae(s){return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;');}

/* ══════ MORPHEME RENDER ══════ */
function rM(mm){if(!mm||!mm.length)return'';return mm.map(m=>{const c=m.m==='p'?'mp':m.m==='r'?'mr':m.m==='s'?'ms':'';return c?'<span class="'+c+'">'+m.t+'</span>':m.t;}).join('');}

/* ══════ PROGRESS ══════ */
function saveProg(id,type,score,total){
  const p=JSON.parse(localStorage.getItem('prog_'+id)||'{}');
  const pct=Math.round(score/total*100);
  if(!p[type]||pct>p[type].pct)p[type]={score,total,pct};
  localStorage.setItem('prog_'+id,JSON.stringify(p));
}
function getChProg(id){
  const p=JSON.parse(localStorage.getItem('prog_'+id)||'{}');
  const vs=Object.values(p).map(v=>v.pct);
  return vs.length?Math.max(...vs):null;
}
function getOK(id){return localStorage.getItem('ok_'+id)==='1';}
function setOK(id,v){if(v)localStorage.setItem('ok_'+id,'1');else localStorage.removeItem('ok_'+id);}
function updateOKBtn(){
  const ok=getOK(currentChId);
  const btn=document.getElementById('okBtn');
  btn.classList.toggle('done',ok);
  btn.textContent=ok?'✓ 已完成':'✓ 完成';
}
function toggleOK(){setOK(currentChId,!getOK(currentChId));updateOKBtn();}

/* ══════ HOME ══════ */
function buildHome(){
  const tot=UNITS.reduce((a,u)=>a+u.chs.length,0);
  const done=UNITS.reduce((a,u)=>a+u.chs.filter(c=>getChProg(c.id)!==null).length,0);
  const unlocked=UNITS.reduce((a,u)=>a+u.chs.filter(c=>c.open).reduce((b,c)=>b+(c.words||0),0),0);
  document.getElementById('heroStats').innerHTML=
    `<div class="hero-stat"><div class="hero-sn">${done}</div><div class="hero-sl">已學習章節</div></div>
     <div class="hero-stat"><div class="hero-sn">${tot}</div><div class="hero-sl">全部章節</div></div>
     <div class="hero-stat"><div class="hero-sn">${unlocked}</div><div class="hero-sl">解鎖單字</div></div>`;
  let h='';let cn=0;
  for(const u of UNITS){
    h+=`<div class="unit-grp"><div class="unit-lbl">Unit ${u.n}</div><div class="ch-row">`;
    for(const c of u.chs){
      const chNum=++cn;
      const prog=c.open?getChProg(c.id):null;

/* ══════ WEB AUDIO — MUSICAL SOUNDS ══════ */
let _ac=null;
function AC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;}
let sndStyle=(()=>{const s=localStorage.getItem('snd');return(!s||s==='mech'||s==='typer')?'soft':s;})();
// Pentatonic scale (C major): two octaves
const PENTA=[261.6,293.7,329.6,392.0,440.0,523.3,587.3,659.3,784.0,880.0];
// For 8-bit: C major scale for melodic sequence
const CSCALE=[261.6,293.7,329.6,349.2,392.0,440.0,493.9,523.3,587.3,659.3,698.5,784.0];
let retroSeq=0; // global sequence for retro cycling
let scifiBase=400; // tracks rising pitch for sci-fi

function getNote(pos,len,combo){
  const base=Math.floor((pos/Math.max(len,1))*6);
  const boost=Math.min(Math.floor((combo||0)/3),3);
  return PENTA[Math.min(base+boost,PENTA.length-1)];
}
function cn(nodes,dest){for(let i=0;i<nodes.length-1;i++)nodes[i].connect(nodes[i+1]);nodes[nodes.length-1].connect(dest||AC().destination);}
function mkN(dur,env){const ctx=AC(),n=Math.floor(ctx.sampleRate*dur),b=ctx.createBuffer(1,n,ctx.sampleRate),d=b.getChannelData(0);for(let i=0;i<n;i++)d[i]=(Math.random()*2-1)*env(i/n);return b;}

function playSound(type,pos,len){
  try{
    const ctx=AC();
    switch(sndStyle){
      case'mech': pMech(ctx,type,pos,len);break;
      case'typer':pTyper(ctx,type,pos,len);break;
      case'retro':pRetro(ctx,type,pos,len);break;
      case'soft': pSoft(ctx,type,pos,len);break;
      case'scifi':pScifi(ctx,type,pos,len);break;
    }
  }catch(e){}
}

function pMech(ctx,type,pos,len){
  const t=ctx.currentTime;
  if(type==='err'){
    const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';
    o.frequency.setValueAtTime(140,t);o.frequency.exponentialRampToValueAtTime(60,t+.12);
    g.gain.setValueAtTime(.28,t);g.gain.exponentialRampToValueAtTime(.001,t+.14);
    cn([o,g]);o.start(t);o.stop(t+.15);return;
  }
  if(type==='done'){
    [0,.09,.18,.28].forEach((dt,i)=>{
      const f=PENTA[5+i],b=mkN(.05,x=>Math.pow(1-x,2.2));
      const s=ctx.createBufferSource(),fl=ctx.createBiquadFilter(),g=ctx.createGain();
      s.buffer=b;fl.type='bandpass';fl.frequency.value=3000+i*1200;fl.Q.value=.7;g.gain.value=.5;
      const o=ctx.createOscillator(),g2=ctx.createGain();o.type='sine';o.frequency.value=f;
      g2.gain.setValueAtTime(.1,t+dt);g2.gain.exponentialRampToValueAtTime(.001,t+dt+.15);
      cn([s,fl,g]);cn([o,g2]);o.start(t+dt);o.stop(t+dt+.16);
    });return;
  }
  // Click + subtle tonal tinge based on word position
  const note=getNote(pos,len,spellCombo);
  const b=mkN(.04,x=>Math.pow(1-x,2));
  const s=ctx.createBufferSource(),fl=ctx.createBiquadFilter(),g=ctx.createGain();
  s.buffer=b;fl.type='bandpass';fl.frequency.value=3500+(pos/Math.max(len,1))*2500;fl.Q.value=.7;g.gain.value=.42;
  cn([s,fl,g]);s.start(t);
  // Tiny tonal layer
  const o=ctx.createOscillator(),g2=ctx.createGain();o.type='sine';o.frequency.value=note;
  g2.gain.setValueAtTime(.055,t);g2.gain.exponentialRampToValueAtTime(.001,t+.07);
  cn([o,g2]);o.start(t);o.stop(t+.08);
}

function pTyper(ctx,type,pos,len){
  const t=ctx.currentTime;
  if(type==='err'){
    const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=880;
    g.gain.setValueAtTime(.22,t);g.gain.exponentialRampToValueAtTime(.001,t+.35);cn([o,g]);o.start(t);o.stop(t+.36);return;
  }
  if(type==='done'){
    const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=1320;
    g.gain.setValueAtTime(.3,t+.1);g.gain.exponentialRampToValueAtTime(.001,t+.75);cn([o,g]);o.start(t+.1);o.stop(t+.76);
  }
  const vol=0.45+Math.random()*0.2;
  const b=mkN(.06,x=>Math.pow(1-x,1.7));
  const s=ctx.createBufferSource(),fl=ctx.createBiquadFilter(),g=ctx.createGain();
  s.buffer=b;fl.type='lowpass';fl.frequency.value=2600+pos*150;g.gain.value=vol;
  cn([s,fl,g]);s.start(t);
}

function pRetro(ctx,type,pos,len){
  const t=ctx.currentTime;
  if(type==='done'){
    [392,494,587,784,1047].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=f;
      const ts=t+i*.09;g.gain.setValueAtTime(.12,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.1);
      cn([o,g]);o.start(ts);o.stop(ts+.11);
    });return;
  }
  if(type==='err'){
    [180,135].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=f;
      const ts=t+i*.06;g.gain.setValueAtTime(.1,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.07);
      cn([o,g]);o.start(ts);o.stop(ts+.08);
    });return;
  }
  // Musical sequence: cycle through C major scale creating a melody
  const f=CSCALE[retroSeq%CSCALE.length];retroSeq++;
  const o=ctx.createOscillator(),g=ctx.createGain();o.type='square';o.frequency.value=f;
  g.gain.setValueAtTime(.11,t);g.gain.exponentialRampToValueAtTime(.001,t+.065);
  cn([o,g]);o.start(t);o.stop(t+.07);
}

function pSoft(ctx,type,pos,len){
  const t=ctx.currentTime;
  if(type==='done'){
    [523,659,784,1047].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=f;
      const ts=t+i*.15;g.gain.setValueAtTime(.12,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.6);
      cn([o,g]);o.start(ts);o.stop(ts+.61);
    });return;
  }
  if(type==='err'){
    const b=mkN(.04,x=>Math.sin(Math.PI*x));
    const s=ctx.createBufferSource(),fl=ctx.createBiquadFilter(),g=ctx.createGain();
    s.buffer=b;fl.type='lowpass';fl.frequency.value=400;g.gain.value=.1;cn([s,fl,g]);s.start(t);return;
  }
  const note=getNote(pos,len,spellCombo);
  const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';o.frequency.value=note;
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.1,t+.015);
  g.gain.exponentialRampToValueAtTime(.001,t+.18);cn([o,g]);o.start(t);o.stop(t+.19);
}

function pScifi(ctx,type,pos,len){
  const t=ctx.currentTime;
  if(type==='done'){
    [220,330,440,660,880,1320].forEach((f,i)=>{
      const o=ctx.createOscillator(),g=ctx.createGain();o.type='sine';const ts=t+i*.085;
      o.frequency.setValueAtTime(f,ts);o.frequency.exponentialRampToValueAtTime(f*1.7,ts+.1);
      g.gain.setValueAtTime(.16,ts);g.gain.exponentialRampToValueAtTime(.001,ts+.2);
      cn([o,g]);o.start(ts);o.stop(ts+.21);
    });return;
  }
  if(type==='err'){
    const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';
    o.frequency.setValueAtTime(320,t);o.frequency.exponentialRampToValueAtTime(90,t+.2);
    g.gain.setValueAtTime(.18,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);cn([o,g]);o.start(t);o.stop(t+.23);return;
  }
  // Each letter sweeps from current pitch to a higher pitch — creates rising tension through the word
  const f1=350+pos*55;const f2=f1*(1.4+Math.random()*.2);
  const o=ctx.createOscillator(),g=ctx.createGain();o.type='sawtooth';
  o.frequency.setValueAtTime(f1,t);o.frequency.exponentialRampToValueAtTime(f2,t+.055);
  g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);cn([o,g]);o.start(t);o.stop(t+.08);
}

/* ══════ SPELL GAME ══════ */
let spList=[],spIdx=0,spPos=0,spellCombo=0,spellScore=0,spellTotal=0,spMist=0;

function initSpell(){
  spList=[];retroSeq=0;scifiBase=400;
  for(const sec of VOCAB)for(const w of sec.words)
    if(w.en.length>=3)spList.push({en:w.en,zh:w.zh.split('　')[0].split('；')[0],type:w.type,kp:sec.kp,ex:w.ex||[],mm:w.mm,mne:w.mne});
  spList.sort(()=>Math.random()-.5);
  spIdx=0;spellScore=0;spellTotal=0;spellCombo=0;renderSpell();
}

function renderSpell(){
  const pg=document.getElementById('pg-spell');
  if(spIdx>=spList.length){showSpellF(pg);return;}
  const w=spList[spIdx];spPos=0;spMist=0;
  retroSeq=Math.floor(Math.random()*CSCALE.length); // start random position for melody
  const re=new RegExp(w.en.replace(/[-[\]{}()*+?.,\\^$|#\s]/g,'\\$&'),'gi');
  let exHtml='';
  if(w.ex.length){
    const ex=w.ex[Math.random()<.5?0:Math.min(1,w.ex.length-1)];
    exHtml=`<div class="sp-ex"><div class="sp-exen">"${ex.en.replace(re,'_'.repeat(w.en.length))}"</div><div class="sp-exzh">${ex.zh}</div></div>`;
  }
  const pct=Math.round(spIdx/spList.length*100);
  const ctag=spellCombo>=3?`<span class="combo">${spellCombo>=10?'🌊':spellCombo>=5?'⚡':'🔥'} ×${spellCombo}</span>`:'';
  pg.innerHTML=`<div class="spell-wrap">
    <div class="sp-header">
      <span>第 ${spIdx+1}／${spList.length}</span>
      <span>${ctag}</span>
      <span class="sp-sct">✅ ${spellScore}/${spellTotal}</span>
    </div>
    <div class="sp-pbar"><div class="sp-pfill" style="width:${pct}%"></div></div>
    <div class="sp-card">
      <div class="sp-en">${w.mm&&w.mm.length?rM(w.mm):w.en}</div>
      <div class="sp-zh">${w.zh}</div>
      <div class="sp-pos">${w.type}</div>
      ${w.mne?`<div class="sp-mne">💡 ${w.mne}</div>`:''}
      ${exHtml}
    </div>
    <div class="sp-hint">
      <span class="sp-lentag">${w.en.length} 個字母</span>
    </div>
    <div class="lboxes${w.en.length>7?' lw':''}" id="lboxes"></div>
    <div class="sp-fb" id="spFb"></div>
    <div class="snd-row">
      <button class="sndbtn${sndStyle==='retro'?' on':''}" onclick="setSnd(this,'retro')">👾 8-bit</button>
      <button class="sndbtn${sndStyle==='soft'?' on':''}" onclick="setSnd(this,'soft')">🍃 柔和</button>
      <button class="sndbtn${sndStyle==='scifi'?' on':''}" onclick="setSnd(this,'scifi')">🚀 科幻</button>
    </div>
    <div class="sp-acts">
      <button class="btn bsc" onclick="speak('${ae(w.en)}')">🔊 聽單字</button>
      <button class="btn bsc" onclick="skipSpell()">跳過 ›</button>
      <button class="btn bsc" onclick="document.getElementById('spellInput')?.focus()" style="font-size:.75rem">📱 點此打字</button>
    </div>
  </div>
  <input id="spellInput" type="text" inputmode="text" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" enterkeyhint="done" style="position:fixed;top:-200px;left:0;width:1px;height:1px;opacity:0;border:none;outline:none;" aria-hidden="true">`;
  initBoxes(w.en,w.mm);
  const _si=document.getElementById('spellInput');
  if(_si){
    _si.value='x';
    _si.oninput=function(){
      const v=_si.value;
      if(v.length===0){handleSpellBack();}
      else if(v.length>1){handleSpellKey(v[v.length-1]);}
      _si.value='x';
    };
    setTimeout(()=>_si.focus(),80);
  }
  document.getElementById('lboxes')?.addEventListener('click',()=>document.getElementById('spellInput')?.focus());
}

function setSnd(btn,s){sndStyle=s;localStorage.setItem('snd',s);document.querySelectorAll('.sndbtn').forEach(b=>b.classList.toggle('on',b===btn));}

function initBoxes(word,mm){
  const c=document.getElementById('lboxes');if(!c)return;c.innerHTML='';
  const mmap=[];
  if(mm&&mm.length){let idx=0;mm.forEach(m=>{for(let j=0;j<m.t.length;j++)mmap[idx++]=m.m||'';});}
  for(let i=0;i<word.length;i++){
    const d=document.createElement('div');d.id='lb'+i;d.className='lb '+(i===0?'cur':'empty');
    if(mmap[i])d.dataset.m=mmap[i];
    d.textContent='';c.appendChild(d);
  }
}
function gB(i){return document.getElementById('lb'+i);}

document.addEventListener('keydown',function(e){
  if(!document.getElementById('pg-spell').classList.contains('on'))return;
  if(e.ctrlKey||e.metaKey||e.altKey)return;
  const ae2=document.activeElement;
  if(ae2&&ae2.id==='spellInput')return; // oninput handles all input when spellInput focused
  if(ae2&&(ae2.tagName==='SELECT'||ae2.tagName==='INPUT'||ae2.tagName==='TEXTAREA'))return;
  if(e.key==='Backspace'){e.preventDefault();handleSpellBack();return;}
  if(e.key.length!==1)return;
  e.preventDefault();handleSpellKey(e.key);
});

function handleSpellKey(key){
  if(spIdx>=spList.length)return;
  const word=spList[spIdx].en;
  if(spPos>=word.length)return;
  const ch=key.toLowerCase(),exp=word[spPos].toLowerCase();
  if(ch===exp){
    // Show ACTUAL typed letter — not a dot
    const box=gB(spPos);
    if(box){box.className='lb typed';box.textContent=word[spPos].toUpperCase();}
    playSound('key',spPos,word.length);
    spPos++;
    if(spPos<word.length){const nb=gB(spPos);if(nb)nb.className='lb cur';}
    if(spPos===word.length)wordDone();
  }else{
    spMist++;playSound('err',spPos,word.length);
    const box=gB(spPos);if(box){box.classList.add('ef');setTimeout(()=>{if(box)box.classList.remove('ef');},200);}
  }
}

function handleSpellBack(){
  if(spIdx>=spList.length||spPos<=0)return;
  const cur=gB(spPos);if(cur){cur.className='lb empty';cur.textContent='';}
  spPos--;
  const box=gB(spPos);if(box){box.className='lb cur';box.textContent='';}
}

function wordDone(){
  const w=spList[spIdx];spellTotal++;spellScore++;
  const perfect=spMist===0;if(perfect)spellCombo++;else spellCombo=0;
  for(let i=0;i<w.en.length;i++){const b=gB(i);if(!b)continue;b.style.animationDelay=(i*.07)+'s';b.className='lb rev';b.textContent=w.en[i].toUpperCase();}
  let msg='';
  if(perfect&&spellCombo>=10)msg='🌊 十連勝！';
  else if(perfect&&spellCombo>=5)msg='⚡ 五連勝！';
  else if(perfect&&spellCombo>=3)msg='🔥 三連勝！';
  else if(perfect)msg='✅ 完美！';
  else msg='✅ 完成！';
  const fb=document.getElementById('spFb');if(fb)fb.innerHTML=`<span class="srok">${msg}</span>`;
  playSound('done',spPos,w.en.length);speak(w.en);
  setTimeout(()=>{spIdx++;renderSpell();},2000);
}

function skipSpell(){
  const w=spList[spIdx];spellTotal++;spellCombo=0;
  for(let i=0;i<w.en.length;i++){const b=gB(i);if(!b)continue;b.style.animationDelay=(i*.06)+'s';b.className='lb rev';b.textContent=w.en[i].toUpperCase();}
  const fb=document.getElementById('spFb');if(fb)fb.innerHTML=`<span class="srsk">⏭ 跳過！答案：<strong>${w.en}</strong></span>`;
  speak(w.en);setTimeout(()=>{spIdx++;renderSpell();},1800);
}

function showSpellF(pg){
  const p=Math.round(spellScore/spList.length*100);
  const stars=p>=90?'⭐⭐⭐':p>=70?'⭐⭐☆':p>=50?'⭐☆☆':'☆☆☆';
  const msg=p>=90?'完美通關！':p>=70?'表現優秀！':p>=50?'繼續加油！':'再練一次吧！';
  saveProg(currentChId,'spell',spellScore,spList.length);
  pg.innerHTML=`<div class="spell-wrap"><div class="pbox"><div class="spfin">
    <div class="spstars">${stars}</div>
    <div class="fttl">拼字遊戲結束！</div>
    <div class="spfsc">${spellScore}/${spList.length}</div>
    <div class="spfpct">正確率 ${p}%</div>
    <div class="spfmsg">${msg}</div>
    <button class="btn brs" onclick="initSpell()">🔄 再挑戰</button>
  </div></div></div>`;
}

/* ══════ BOOKMARK ══════ */
function buildBM(){
  const bm=getBM(),pg=document.getElementById('pg-bookmark');
  if(!bm.length){pg.innerHTML='<div class="bmmt">⭐ 尚無收藏單字<br><small>在「單字」頁點擊 ☆ 加入收藏</small></div>';return;}
  let h=`<div class="ctrl"><span style="font-size:.86rem;color:var(--tx2)">收藏 <strong>${bm.length}</strong> 個</span>
    <button class="cbtn" onclick="if(confirm('確定清除全部收藏？')){setBM([]);buildBM();buildVocab();}">🗑 全部清除</button>
  </div><div class="bmgr">`;
  for(const b of bm)
    h+=`<div class="bmcard">
      <div style="display:flex;align-items:center;gap:6px">
        <span class="bmw" data-text="${ae(b.en)}" onclick="speak(this.dataset.text)">${b.en}</span>
        <span style="font-size:.68rem;color:var(--tx3)">🔊</span>
      </div>
      <div class="bmzh">${b.zh}</div>
      <div class="bmkp">${b.kp}</div>
      <button class="bmrm" onclick="togBM('${ae(b.en)}')">移除</button></div>`;
  h+='</div>';pg.innerHTML=h;
}

/* ══════ PASSWORD GATE ══════ */
function checkPW(){
  const v=document.getElementById('pwInput').value;
  if(v==='9527'){
    document.getElementById('pw-gate').style.display='none';
    document.getElementById('pwInput').value='';
  } else {
    const err=document.getElementById('pwErr');
    err.textContent='密碼錯誤，請再試一次';
    document.getElementById('pwInput').value='';
    document.getElementById('pwInput').focus();
    setTimeout(()=>err.textContent='',2000);
  }
}
document.getElementById('pwInput').focus();

/* ══════ INIT ══════ */
buildHome();
</script>
